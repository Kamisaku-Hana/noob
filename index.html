<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>霓虹深渊：极速蛇行 Neon Snake</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff007f;
            --neon-yellow: #ffeb3b;
            --neon-green: #39ff14;
            --bg-dark: #0a0a16;
            --bg-panel: rgba(16, 16, 36, 0.85);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 243, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 127, 0.05) 0%, transparent 40%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 游戏容器 */
        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg-panel);
            border: 2px solid rgba(0, 243, 255, 0.2);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.15), inset 0 0 15px rgba(255, 0, 127, 0.05);
            backdrop-filter: blur(10px);
            max-width: 95vw;
        }

        /* 头部状态栏 */
        #header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score-box {
            font-size: 1.1rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .high-box {
            font-size: 1.1rem;
            color: var(--neon-pink);
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
        }

        /* 游戏画布 */
        canvas {
            background: #050510;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 243, 255, 0.1);
            display: block;
            touch-action: none;
        }

        /* 遮罩面板（主菜单/游戏结束） */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 15, 0.95);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan), 0 0 30px var(--neon-pink);
            margin-bottom: 25px;
            letter-spacing: 4px;
            text-align: center;
            animation: breathe 2s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* 按钮样式 */
        .btn {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px 36px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 15px;
        }

        .btn:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--neon-cyan);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* 状态道具指示器 */
        #buff-indicator {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            height: 25px;
        }

        .buff-tag {
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            animation: blink 1s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 0.6; }
            to { opacity: 1; }
        }

        /* 虚拟方向盘 (手机端) */
        #controls {
            display: none;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 10px;
            margin-top: 20px;
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 50%;
            color: var(--neon-cyan);
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 243, 255, 0.1);
        }

        .ctrl-btn:active {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }

        /* 游戏玩法指南 */
        .instructions {
            margin-top: 15px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            text-align: center;
            max-width: 320px;
            line-height: 1.4;
        }

        /* 适配移动端 */
        @media (max-width: 768px) {
            #controls { display: grid; }
            #game-container { padding: 10px; }
            .instructions { display: none; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- 头部数据 -->
        <div id="header">
            <div class="score-box">SCORE: <span id="score">0</span></div>
            <div class="high-box">BEST: <span id="high-score">0</span></div>
        </div>

        <!-- 游戏画布 -->
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <!-- 状态道具指示器 -->
        <div id="buff-indicator"></div>

        <!-- 虚拟键盘 (移动端专用) -->
        <div id="controls">
            <button class="ctrl-btn" id="btn-up">↑</button>
            <button class="ctrl-btn" id="btn-left">←</button>
            <button class="ctrl-btn" id="btn-right">→</button>
            <button class="ctrl-btn" id="btn-down">↓</button>
        </div>

        <!-- 电脑玩法说明 -->
        <div class="instructions">
            使用电脑方向键 <b>↑ ↓ ← →</b> 或 <b>W A S D</b> 控制移动。<br>
            躲避红色障碍物，吃掉发光的能量球！
        </div>

        <!-- 主菜单界面 -->
        <div id="menu-overlay" class="overlay">
            <h1>NEON SNAKE</h1>
            <p style="color: rgba(255,255,255,0.6); margin-bottom: 20px; font-size: 0.9rem;">霓 虹 深 渊 极 速 蛇 行</p>
            <button class="btn" id="start-btn">开始游戏</button>
        </div>

        <!-- 游戏结束界面 -->
        <div id="over-overlay" class="overlay hidden">
            <h1 style="text-shadow: 0 0 10px var(--neon-pink);">GAME OVER</h1>
            <p style="font-size: 1.2rem; margin-bottom: 10px;">最终得分: <span id="final-score" style="color:var(--neon-cyan); font-weight:bold;">0</span></p>
            <p id="new-high-txt" style="color: var(--neon-yellow); font-weight:bold; margin-bottom: 20px; display:none; animation: blink 0.5s infinite alternate;">🔥 创造了新纪录！ 🔥</p>
            <button class="btn" id="restart-btn" style="border-color: var(--neon-pink); color: var(--neon-pink); box-shadow: 0 0 10px rgba(255,0,127,0.2);">重新开始</button>
        </div>
    </div>

    <script>
        /**
         * 1. 声音合成器 (Web Audio API)
         * 不需要任何外部音频资源，纯算法合成复古8位机声音
         */
        const AudioSynth = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },
            playEat() {
                this.init();
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, this.ctx.currentTime + 0.15);
                
                gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.15);
            },
            playBuff() {
                this.init();
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, this.ctx.currentTime);
                osc.frequency.setValueAtTime(400, this.ctx.currentTime + 0.08);
                osc.frequency.setValueAtTime(800, this.ctx.currentTime + 0.16);
                
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.3);
            },
            playDead() {
                this.init();
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(80, this.ctx.currentTime + 0.6);
                
                gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.6);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.6);
            },
            playClick() {
                this.init();
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, this.ctx.currentTime);
                
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.05);
            }
        };

        /**
         * 2. 游戏核心逻辑
         */
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // 基础配置
        const GRID_SIZE = 20; // 格子大小 (20x20像素)
        const TILE_COUNT = canvas.width / GRID_SIZE; // 每行/列有多少格子 (20个)
        
        let snake = [];
        let dir = { x: 0, y: 0 };
        let nextDir = { x: 0, y: 0 };
        
        let food = { x: 0, y: 0, type: 'normal' }; // 食物
        let obstacles = []; // 静态障碍物 (随着得分增加而变多)
        let particles = []; // 爆炸粒子效果

        let score = 0;
        let highScore = localStorage.getItem("neon_snake_highscore") || 0;
        document.getElementById("high-score").innerText = highScore;

        let gameInterval = null;
        let isGameOver = false;
        let isStarted = false;
        
        // 游戏速度和难度变量
        let baseSpeed = 130; // 毫秒/帧 (数值越小速度越快)
        let currentSpeed = baseSpeed;

        // 道具 Buff 系统
        let buffs = {
            shield: 0,      // 护盾免死次数
            slow: 0,        // 减速剩余毫秒
            double: 0       // 双倍剩余毫秒
        };

        // 颜色映射配置
        const COLORS = {
            bg: '#050510',
            grid: 'rgba(255, 255, 255, 0.02)',
            obstacle: '#ff3333',
            obstacleGlow: 'rgba(255, 51, 51, 0.6)',
            snakeHead: '#00f3ff',
            snakeBody: 'rgba(0, 243, 255, 0.8)',
            foodNormal: '#ff007f',
            foodShield: '#ffeb3b', // 护盾道具：黄色
            foodSlow: '#00f3ff',   // 减速道具：蓝白
            foodDouble: '#39ff14'  // 双倍积分：绿色
        };

        // 食物类型权重
        const FOOD_TYPES = [
            { type: 'normal', weight: 70, color: COLORS.foodNormal },
            { type: 'shield', weight: 10, color: COLORS.foodShield },
            { type: 'slow', weight: 10, color: COLORS.foodSlow },
            { type: 'double', weight: 10, color: COLORS.foodDouble }
        ];

        // 初始化/重置游戏状态
        function resetGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            dir = { x: 0, y: -1 }; // 默认向上移动
            nextDir = { x: 0, y: -1 };
            score = 0;
            updateScoreUI();
            
            obstacles = [];
            particles = [];
            buffs = { shield: 0, slow: 0, double: 0 };
            updateBuffUI();

            generateFood();
            isGameOver = false;
            currentSpeed = baseSpeed;

            if (gameInterval) clearInterval(gameInterval);
            gameLoop();
        }

        // 生成食物
        function generateFood() {
            // 随机决定食物种类
            let roll = Math.random() * 100;
            let cumulative = 0;
            let selectedType = 'normal';
            for (let f of FOOD_TYPES) {
                cumulative += f.weight;
                if (roll <= cumulative) {
                    selectedType = f.type;
                    break;
                }
            }

            // 寻找不与蛇身和障碍物重叠的位置
            let attempts = 0;
            while (attempts < 200) {
                let rx = Math.floor(Math.random() * TILE_COUNT);
                let ry = Math.floor(Math.random() * TILE_COUNT);

                let overlap = snake.some(seg => seg.x === rx && seg.y === ry) ||
                              obstacles.some(obs => obs.x === rx && obs.y === ry);

                if (!overlap) {
                    food = { x: rx, y: ry, type: selectedType };
                    return;
                }
                attempts++;
            }
            // 兜底机制
            food = { x: 1, y: 1, type: 'normal' };
        }

        // 生成障碍物 (随着得分变高逐渐增加)
        function spawnObstacle() {
            let rx, ry;
            let attempts = 0;
            while(attempts < 100) {
                rx = Math.floor(Math.random() * TILE_COUNT);
                ry = Math.floor(Math.random() * TILE_COUNT);

                // 距离蛇头和食物保持一定距离，防止刷新在脸上突毙
                let distToHead = Math.abs(rx - snake[0].x) + Math.abs(ry - snake[0].y);
                let distToFood = Math.abs(rx - food.x) + Math.abs(ry - food.y);

                let overlap = snake.some(seg => seg.x === rx && seg.y === ry) ||
                              obstacles.some(obs => obs.x === rx && obs.y === ry) ||
                              distToHead < 4 || distToFood < 2;

                if (!overlap) {
                    obstacles.push({ x: rx, y: ry });
                    // 刷出障碍物时震动一下，并播放粒子效果
                    createExplosion(rx * GRID_SIZE + GRID_SIZE/2, ry * GRID_SIZE + GRID_SIZE/2, COLORS.obstacle, 8);
                    break;
                }
                attempts++;
            }
        }

        // 创建粒子爆炸效果
        function createExplosion(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    alpha: 1,
                    decay: 0.03 + Math.random() * 0.03,
                    color: color,
                    size: 2 + Math.random() * 3
                });
            }
        }

        // 更新游戏画面与状态
        function update() {
            if (isGameOver) return;

            // 1. 处理道具倒计时
            if (buffs.slow > 0) {
                buffs.slow -= currentSpeed;
                if (buffs.slow <= 0) buffs.slow = 0;
            }
            if (buffs.double > 0) {
                buffs.double -= currentSpeed;
                if (buffs.double <= 0) buffs.double = 0;
            }
            updateBuffUI();

            // 2. 根据Buff计算当前移动帧间隔
            let delay = baseSpeed;
            if (buffs.slow > 0) delay = baseSpeed * 1.5; // 减速状态
            // 蛇移动速度上限，随分数逐步微调变快
            delay = Math.max(70, delay - Math.floor(score / 5) * 4);
            currentSpeed = delay;

            // 3. 更新蛇头坐标
            dir = { ...nextDir };
            let nextX = snake[0].x + dir.x;
            let nextY = snake[0].y + dir.y;

            // 4. 碰撞检测（墙壁、障碍、自己）
            let hitWall = nextX < 0 || nextX >= TILE_COUNT || nextY < 0 || nextY >= TILE_COUNT;
            let hitSelf = snake.some((seg, idx) => idx > 0 && seg.x === nextX && seg.y === nextY);
            let hitObstacle = obstacles.some(obs => obs.x === nextX && obs.y === nextY);

            if (hitWall || hitSelf || hitObstacle) {
                // 如果拥有护盾，则消耗护盾抵消死亡
                if (buffs.shield > 0) {
                    buffs.shield--;
                    AudioSynth.playBuff();
                    // 产生金色粒子护罩碎裂效果
                    createExplosion(snake[0].x * GRID_SIZE + GRID_SIZE/2, snake[0].y * GRID_SIZE + GRID_SIZE/2, COLORS.foodShield, 25);
                    // 弹回安全方向或者停在原地让玩家反应（这里通过改变蛇的方向避免撞墙，或者硬穿墙）
                    if (hitWall) {
                        // 穿墙过来
                        nextX = (nextX + TILE_COUNT) % TILE_COUNT;
                        nextY = (nextY + TILE_COUNT) % TILE_COUNT;
                    } else {
                        // 如果撞障碍或撞身体，移除那个障碍，或者直接返回不处理这次前进，给1帧硬直
                        if (hitObstacle) {
                            obstacles = obstacles.filter(obs => !(obs.x === nextX && obs.y === nextY));
                        } else {
                            return; // 撞自己直接刹车
                        }
                    }
                } else {
                    // 无护盾，游戏结束
                    triggerGameOver();
                    return;
                }
            }

            // 将新头部推入首位
            const newHead = { x: nextX, y: nextY };
            snake.unshift(newHead);

            // 5. 判定吃食物
            if (newHead.x === food.x && newHead.y === food.y) {
                // 吃到了！
                let eatColor = COLORS.foodNormal;
                let pts = 1;

                if (food.type === 'normal') {
                    AudioSynth.playEat();
                } else {
                    AudioSynth.playBuff();
                }

                // 处理各种道具食物
                if (food.type === 'shield') {
                    buffs.shield = Math.min(3, buffs.shield + 1); // 最多叠加3层护盾
                    eatColor = COLORS.foodShield;
                } else if (food.type === 'slow') {
                    buffs.slow += 8000; // 减速8秒
                    eatColor = COLORS.foodSlow;
                } else if (food.type === 'double') {
                    buffs.double += 8000; // 双倍积分8秒
                    eatColor = COLORS.foodDouble;
                }

                // 积分计算
                if (buffs.double > 0) pts = 2;
                score += pts;
                updateScoreUI();

                // 爆炸特效
                createExplosion(food.x * GRID_SIZE + GRID_SIZE/2, food.y * GRID_SIZE + GRID_SIZE/2, eatColor, 18);

                // 每得4分，额外长出1个不可触碰的障碍物以提升后期难度
                if (score % 4 === 0) {
                    spawnObstacle();
                }

                generateFood();
            } else {
                // 没有吃到食物，蛇尾部缩短以保持原有长度前进
                snake.pop();
            }

            // 6. 更新粒子轨迹
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // 绘制界面所有元素
        function draw() {
            // 清理画布
            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格辅助线 (赛博朋克风背景格线)
            ctx.strokeStyle = COLORS.grid;
            ctx.lineWidth = 1;
            for (let i = 0; i < TILE_COUNT; i++) {
                // 纵线
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();
                // 横线
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }

            // 绘制静态障碍物
            obstacles.forEach(obs => {
                ctx.shadowBlur = 10;
                ctx.shadowColor = COLORS.obstacleGlow;
                ctx.fillStyle = COLORS.obstacle;
                // 绘制内嵌感的方格障碍物
                ctx.fillRect(obs.x * GRID_SIZE + 2, obs.y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4);
            });

            // 绘制发光的食物
            let foodGlow = COLORS.foodNormal;
            if (food.type === 'shield') foodGlow = COLORS.foodShield;
            if (food.type === 'slow') foodGlow = COLORS.foodSlow;
            if (food.type === 'double') foodGlow = COLORS.foodDouble;

            ctx.shadowBlur = 15;
            ctx.shadowColor = foodGlow;
            ctx.fillStyle = foodGlow;
            ctx.beginPath();
            let radius = GRID_SIZE / 2 - 2;
            // 呼吸跳跃感
            let pulse = Math.sin(Date.now() / 150) * 1.5;
            ctx.arc(food.x * GRID_SIZE + GRID_SIZE/2, food.y * GRID_SIZE + GRID_SIZE/2, radius + pulse, 0, Math.PI * 2);
            ctx.fill();

            // 绘制蛇身
            snake.forEach((seg, index) => {
                ctx.shadowBlur = index === 0 ? 12 : 5;
                
                // 头跟身体使用渐变色区分，若是特殊Buff状态展示状态颜色
                if (index === 0) {
                    ctx.shadowColor = buffs.shield > 0 ? COLORS.foodShield : COLORS.snakeHead;
                    ctx.fillStyle = buffs.shield > 0 ? COLORS.foodShield : COLORS.snakeHead;
                } else {
                    let gradRatio = index / snake.length;
                    ctx.shadowColor = 'rgba(0, 243, 255, 0.4)';
                    // 身体产生幻彩彩虹渐变 (蓝 -> 紫)
                    ctx.fillStyle = `hsla(${180 + gradRatio * 100}, 100%, 50%, ${1 - gradRatio * 0.5})`;
                }

                // 绘制圆角蛇身
                ctx.beginPath();
                let x = seg.x * GRID_SIZE;
                let y = seg.y * GRID_SIZE;
                let r = 4; // 圆角弧度
                ctx.roundRect(x + 1, y + 1, GRID_SIZE - 2, GRID_SIZE - 2, r);
                ctx.fill();
            });

            // 重置阴影防止影响其它普通元素
            ctx.shadowBlur = 0;

            // 绘制粒子效果
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0; // 恢复透明度
        }

        // 统一循环调度
        function gameLoop() {
            update();
            draw();
            if (!isGameOver) {
                setTimeout(gameLoop, currentSpeed);
            }
        }

        // 触发游戏结束
        function triggerGameOver() {
            isGameOver = true;
            AudioSynth.playDead();
            
            // 处理最高分
            let newRecord = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("neon_snake_highscore", highScore);
                document.getElementById("high-score").innerText = highScore;
                newRecord = true;
            }

            document.getElementById("final-score").innerText = score;
            document.getElementById("new-high-txt").style.display = newRecord ? 'block' : 'none';
            document.getElementById("over-overlay").classList.remove("hidden");
        }

        // 界面数据更新
        function updateScoreUI() {
            document.getElementById("score").innerText = score;
        }

        // 更新状态图标
        function updateBuffUI() {
            const container = document.getElementById("buff-indicator");
            container.innerHTML = '';
            
            if (buffs.shield > 0) {
                container.innerHTML += `<span class="buff-tag" style="background:${COLORS.foodShield}; color:#000;">🛡️ 护盾 x${buffs.shield}</span>`;
            }
            if (buffs.slow > 0) {
                let sec = (buffs.slow / 1000).toFixed(1);
                container.innerHTML += `<span class="buff-tag" style="background:${COLORS.foodSlow}; color:#000;">🌀 减速 ${sec}s</span>`;
            }
            if (buffs.double > 0) {
                let sec = (buffs.double / 1000).toFixed(1);
                container.innerHTML += `<span class="buff-tag" style="background:${COLORS.foodDouble}; color:#000;">💎 双倍积分 ${sec}s</span>`;
            }
        }

        /**
         * 3. 玩家控制输入处理
         */

        // 方向控制核心判断，防止180度反转自杀
        function setDirection(newX, newY) {
            // 当前只有一个格子或者正在向前运动时，不能直接反向
            if (dir.x !== 0 && newX === -dir.x) return;
            if (dir.y !== 0 && newY === -dir.y) return;
            nextDir = { x: newX, y: newY };
        }

        // 电脑键盘支持
        window.addEventListener("keydown", (e) => {
            if (!isStarted || isGameOver) return;
            
            switch (e.key.toLowerCase()) {
                case "arrowup":
                case "w":
                    setDirection(0, -1);
                    e.preventDefault();
                    break;
                case "arrowdown":
                case "s":
                    setDirection(0, 1);
                    e.preventDefault();
                    break;
                case "arrowleft":
                case "a":
                    setDirection(-1, 0);
                    e.preventDefault();
                    break;
                case "arrowright":
                case "d":
                    setDirection(1, 0);
                    e.preventDefault();
                    break;
            }
        });

        // 移动端轻扫（滑动）手势支持
        let touchStartX = 0;
        let touchStartY = 0;
        canvas.addEventListener("touchstart", (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        canvas.addEventListener("touchend", (e) => {
            if (!isStarted || isGameOver) return;

            let diffX = e.changedTouches[0].screenX - touchStartX;
            let diffY = e.changedTouches[0].screenY - touchStartY;

            // 设定滑动阈值，避免轻微抖动误触发
            if (Math.abs(diffX) > 30 || Math.abs(diffY) > 30) {
                if (Math.abs(diffX) > Math.abs(diffY)) {
                    // 水平滑动
                    if (diffX > 0) setDirection(1, 0);
                    else setDirection(-1, 0);
                } else {
                    // 垂直滑动
                    if (diffY > 0) setDirection(0, 1);
                    else setDirection(0, -1);
                }
            }
        }, { passive: true });

        // 虚拟按键触发 (针对移动端按键)
        const setupMobileButton = (btnId, dx, dy) => {
            const btn = document.getElementById(btnId);
            const trigger = (e) => {
                e.preventDefault();
                AudioSynth.playClick();
                setDirection(dx, dy);
            };
            btn.addEventListener("touchstart", trigger, {passive: false});
            btn.addEventListener("mousedown", trigger);
        };
        
        setupMobileButton("btn-up", 0, -1);
        setupMobileButton("btn-down", 0, 1);
        setupMobileButton("btn-left", -1, 0);
        setupMobileButton("btn-right", 1, 0);


        /**
         * 4. 菜单按钮交互
         */
        document.getElementById("start-btn").addEventListener("click", () => {
            AudioSynth.playClick();
            document.getElementById("menu-overlay").classList.add("hidden");
            isStarted = true;
            resetGame();
        });

        document.getElementById("restart-btn").addEventListener("click", () => {
            AudioSynth.playClick();
            document.getElementById("over-overlay").classList.add("hidden");
            resetGame();
        });

        // 首次绘制出静态画板做为精美背景
        draw();
    </script>
</body>
</html>
